name: run-observer-tests
run-name: Run observer tests
on: [push]
jobs:
  run-observer-tests:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v6
      - name: Setup docker
        uses: docker/setup-buildx-action@v3
      - name: Setup .env
        run: |
          echo "DOCKER_PORT=${{ secrets.DOCKER_PORT }}" >> ./observer/.env
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> ./observer/.env
          echo "APP_NAME=${{ secrets.APP_NAME }}" >> ./observer/.env
      - name: Build Service
        run: make observer build
      - name: Run tests
        run: make observer test
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            logs/
            tests.log
